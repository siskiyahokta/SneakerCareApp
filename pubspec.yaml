name: sneaker_care_app
description: "Sneakimy Care - aplikasi jasa cuci dan perawatan sneaker."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  http: ^1.6.0

  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2

  # Dipakai versi 6.2.2 biar cocok dengan kode GoogleSignIn().signIn()
  google_sign_in: 6.2.2
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/